name: deployik

# =============================================================================
# Deployik - Self-hosted Deployment Platform
# =============================================================================
# Prerequisites (run scripts/bootstrap.sh once, or set them up yourself):
#   1. A shared external Docker network named `proxy` that an nginx-proxy
#      container also joins (Deployik writes vhosts; nginx-proxy serves them):
#        docker network create proxy
#   2. The host directories below (override paths via the *_DIR env vars):
#        /opt/nginx-proxy/{conf.d,html,certs}, /opt/backups/deployik
#   3. A `.env` file (copy from ../.env.example) with at least JWT_SECRET,
#      ENCRYPTION_KEY, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, and BASE_DOMAIN.
#
# Usage (from the repo root): docker compose -f docker/docker-compose.yml up -d
# =============================================================================

services:
  app:
    image: ${DEPLOYIK_IMAGE:-ghcr.io/lefteq/lovinka-deployik}:${IMAGE_TAG:-latest}
    container_name: deployik
    restart: unless-stopped
    # env_file supplies the required secrets and BASE_DOMAIN; see .env.example.
    env_file: .env
    environment:
      PORT: 8080
      DATABASE_PATH: /data/deployik.db
      DATA_DIR: /data
      NGINX_CONF_DIR: /nginx-conf
      PROXY_CONTAINER_NAME: ${PROXY_CONTAINER_NAME:-nginx-proxy}
      PROXY_CERTS_DIR: ${NGINX_PROXY_DIR:-/opt/nginx-proxy}/certs
      PROXY_HTML_DIR: ${NGINX_PROXY_DIR:-/opt/nginx-proxy}/html
      SSL_EMAIL: ${SSL_EMAIL:-admin@example.com}
      BUILD_DIR: /tmp/deployik-builds
      # Analytics is optional. Leave these unset (the defaults below are empty)
      # unless you run your own Umami instance; point them at it if you do.
      ANALYTICS_UMAMI_URL: ${ANALYTICS_UMAMI_URL:-}
      ANALYTICS_UMAMI_PUBLIC_URL: ${ANALYTICS_UMAMI_PUBLIC_URL:-}
      ANALYTICS_UMAMI_SCRIPT_URL: ${ANALYTICS_UMAMI_SCRIPT_URL:-}
      ANALYTICS_UMAMI_USERNAME: ${ANALYTICS_UMAMI_USERNAME:-}
      ANALYTICS_UMAMI_PASSWORD: ${ANALYTICS_UMAMI_PASSWORD:-}
      # Optional: point at your own Loki to enable runtime analytics.
      ANALYTICS_LOKI_URL: ${ANALYTICS_LOKI_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${NGINX_PROXY_DIR:-/opt/nginx-proxy}/conf.d:/nginx-conf
      # Shared auth page dir: WriteAuthPage() writes auth.html here on startup
      # (PROXY_HTML_DIR), and nginx-proxy serves it from the same host dir at
      # /var/www/html. Without this mount the page is written inside the
      # container only and never reaches the proxy.
      - ${NGINX_PROXY_DIR:-/opt/nginx-proxy}/html:${NGINX_PROXY_DIR:-/opt/nginx-proxy}/html
      - deployik_data:/data
      - ${BACKUPS_DIR:-/opt/backups/deployik}:/backups
      - /tmp/deployik-builds:/tmp/deployik-builds
    networks:
      - proxy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          # 512m (was 256m) gives headroom for WebSocket log streaming during
          # heavy builds and the in-process retention worker; current steady
          # state is ~32 MB so this is a ceiling, not a target.
          memory: 512m
          cpus: '2.0'
    # OOM kernel priority. -500 makes Deployik very hard to kill if the host
    # runs out of memory — we'd much rather a misbehaving tenant container
    # (left at default 0) gets selected first than lose the control plane
    # that would let an operator stop it. Range is -1000 (never killed) to
    # +1000 (kill first); -500 matches what nginx-proxy and postgres get on
    # the same shape of host.
    oom_score_adj: -500
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

volumes:
  deployik_data:

networks:
  # Shared with the nginx-proxy container. Create it once with
  # `docker network create proxy` (scripts/bootstrap.sh does this for you).
  proxy:
    external: true
